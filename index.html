<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wildan Renaldinata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(270deg, #ff6ec7, #42a5f5, #ffb74d);
      min-height: 100vh;
    }
    section {
      background: #fff;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      max-width: 500px;
      text-align: center;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      gap: 5px;
      justify-content: center;
    }
    .cell {
      width: 90px;
      height: 90px;
      font-size: 35px;
      border: 2px solid #000;
      cursor: pointer;
      line-height: 90px;
    }
  </style>
</head>

<body>

<section>
  <h2>❌⭕ Tic Tac Toe MODE DEWA 😈</h2>
  <div id="board">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <p id="status">Giliran: Kamu (X)</p>
  <button onclick="resetGame()">🔄 Reset</button>
</section>

<script>
const cells = document.querySelectorAll(".cell");
const statusText = document.getElementById("status");
let gameOver = false;

function checkWin(mark){
  const win = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return win.some(([a,b,c]) =>
    cells[a].textContent===mark &&
    cells[b].textContent===mark &&
    cells[c].textContent===mark
  );
}

function checkDraw(){
  return [...cells].every(c => c.textContent !== "");
}

/* ===== AI DEWA ===== */
function minimax(board,isMax){
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function winner(b){
    for(let [a,b1,c] of wins){
      if(b[a] && b[a]==b[b1] && b[a]==b[c]) return b[a];
    }
    if(!b.includes("")) return "draw";
    return null;
  }

  let res = winner(board);
  if(res==="O") return 1;
  if(res==="X") return -1;
  if(res==="draw") return 0;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(board[i]==""){
        board[i]="O";
        best=Math.max(best,minimax(board,false));
        board[i]="";
      }
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(board[i]==""){
        board[i]="X";
        best=Math.min(best,minimax(board,true));
        board[i]="";
      }
    }
    return best;
  }
}

function botMove(){
  if(gameOver) return;

  let board=[...cells].map(c=>c.textContent);
  let bestScore=-Infinity;
  let move;

  for(let i=0;i<9;i++){
    if(board[i]==""){
      board[i]="O";
      let score=minimax(board,false);
      board[i]="";
      if(score>bestScore){
        bestScore=score;
        move=i;
      }
    }
  }

  cells[move].textContent="O";

  if(checkWin("O")){
    statusText.textContent="❌ Kamu Kalah! 🤖🔥";
    gameOver=true;
  } else if(checkDraw()){
    statusText.textContent="😅 Seri!";
    gameOver=true;
  } else {
    statusText.textContent="Giliran: Kamu (X)";
  }
}

/* ===== PLAYER ===== */
cells.forEach(cell=>{
  cell.onclick=()=>{
    if(cell.textContent!=="" || gameOver) return;

    cell.textContent="X";

    if(checkWin("X")){
      statusText.textContent="🎉 Kamu Menang!";
      gameOver=true;
    } else if(checkDraw()){
      statusText.textContent="😅 Seri!";
      gameOver=true;
    } else {
      statusText.textContent="Bot berpikir...";
      setTimeout(botMove,300);
    }
  }
});

function resetGame(){
  cells.forEach(c=>c.textContent="");
  gameOver=false;
  statusText.textContent="Giliran: Kamu (X)";
}
</script>

</body>
</html>
