<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wildan Game App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f172a;
color:#fff;
font-family:sans-serif;
}
.screen{display:none;}
.active{display:block;}
.card{border-radius:20px}
canvas{background:#000;border-radius:10px}
.btn{border-radius:12px}
</style>
</head>

<body>

<div class="container py-3">

<!-- LOGIN -->
<div id="loginScreen" class="screen active text-center">
<h3>🎮 Login Game</h3>
<input id="playerName" class="form-control my-3" placeholder="Masukkan nama">
<button class="btn btn-success w-100" onclick="login()">Masuk</button>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen text-center">
<h3>🏠 Game Menu</h3>

<div class="card p-3 mb-2" onclick="openGame('flappy')">🔥 Flappy</div>
<div class="card p-3 mb-2" onclick="openGame('dodge')">🧱 Dodge</div>
<div class="card p-3 mb-2" onclick="openGame('reaction')">⚡ Reaction</div>
<div class="card p-3 mb-2" onclick="openGame('memory')">🧠 Memory</div>

<div class="card p-3 mt-3">
<h5>🏆 Leaderboard</h5>
<ul id="leaderboard"></ul>
</div>

</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen text-center">
<button class="btn btn-secondary mb-2" onclick="goHome()">⬅️ Kembali</button>

<!-- FLAPPY -->
<div id="flappyGame" class="game">
<h5>🔥 Flappy</h5>
<canvas id="flappy" width="300" height="400"></canvas>
<p>Score: <span id="flappyScore">0</span></p>
</div>

<!-- DODGE -->
<div id="dodgeGame" class="game">
<h5>🧱 Dodge</h5>
<canvas id="dodge" width="300" height="300"></canvas>
<p>Score: <span id="dodgeScore">0</span></p>
</div>

<!-- REACTION -->
<div id="reactionGame" class="game">
<h5>⚡ Reaction</h5>
<div id="reactionBox" style="height:120px;background:red;border-radius:10px"></div>
<p id="reactionText"></p>
</div>

<!-- MEMORY -->
<div id="memoryGame" class="game">
<h5>🧠 Memory</h5>
<div id="memory"></div>
<p id="memText"></p>
</div>

</div>

</div>

<script>

// ===== GLOBAL =====
let player="Guest";

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ===== LOGIN =====
function login(){
player = document.getElementById("playerName").value || "Guest";
show("homeScreen");
}

// ===== NAVIGATION =====
function openGame(game){
show("gameScreen");
document.querySelectorAll(".game").forEach(g=>g.style.display="none");
document.getElementById(game+"Game").style.display="block";
}

function goHome(){
show("homeScreen");
}

// ===== SOUND =====
function playSound(){
let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
audio.play();
}

// ===== LEADERBOARD =====
function saveScore(game,score){
let data=JSON.parse(localStorage.getItem("scores")||"[]");
data.push({player,game,score});
data.sort((a,b)=>b.score-a.score);
data=data.slice(0,5);
localStorage.setItem("scores",JSON.stringify(data));
renderLeaderboard();
}

function renderLeaderboard(){
let data=JSON.parse(localStorage.getItem("scores")||"[]");
let el=document.getElementById("leaderboard");
el.innerHTML="";
data.forEach(d=>{
let li=document.createElement("li");
li.innerText=`${d.player} - ${d.game} (${d.score})`;
el.appendChild(li);
});
}
renderLeaderboard();


// ===== FLAPPY =====
let ctx=flappy.getContext("2d");
let bird={x:50,y:150,v:0},pipes=[],scoreF=0;

function loopF(){
ctx.clearRect(0,0,300,400);
bird.v+=0.6;bird.y+=bird.v;

ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,20,20);

if(Math.random()<0.03){
let h=Math.random()*200;
pipes.push({x:300,top:h,bottom:h+120});
}

pipes.forEach(p=>{
p.x-=4;
ctx.fillStyle="green";
ctx.fillRect(p.x,0,30,p.top);
ctx.fillRect(p.x,p.bottom,30,400);

if(bird.x<p.x+30 && bird.x+20>p.x && (bird.y<p.top||bird.y>p.bottom)){
playSound();
saveScore("Flappy",scoreF);
scoreF=0;pipes=[];bird.y=150;
}
});

scoreF++;
flappyScore.innerText=scoreF;

requestAnimationFrame(loopF);
}
flappy.onclick=()=>bird.v=-8;
loopF();


// ===== DODGE =====
let d=dodge.getContext("2d");
let playerX=140,blocks=[],scoreD=0;

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft")playerX-=20;
if(e.key=="ArrowRight")playerX+=20;
playerX=Math.max(0,Math.min(280,playerX));
});

function loopD(){
d.clearRect(0,0,300,300);
d.fillStyle="white";
d.fillRect(playerX,260,20,20);

if(Math.random()<0.05)blocks.push({x:Math.random()*280,y:0});

blocks.forEach(b=>{
b.y+=3;
d.fillRect(b.x,b.y,20,20);

if(b.y>260 && b.x<playerX+20 && b.x+20>playerX){
playSound();
saveScore("Dodge",scoreD);
scoreD=0;blocks=[];
}
});

scoreD++;
dodgeScore.innerText=scoreD;

requestAnimationFrame(loopD);
}
loopD();


// ===== REACTION =====
let start;
function startR(){
reactionBox.style.background="red";
setTimeout(()=>{
reactionBox.style.background="green";
start=Date.now();
},Math.random()*3000+1000);
}
reactionBox.onclick=()=>{
if(reactionBox.style.background=="green"){
let t=Date.now()-start;
reactionText.innerText=t+" ms";
saveScore("Reaction",1000-t);
}else{
reactionText.innerText="KECEPETAN!";
}
startR();
}
startR();


// ===== MEMORY =====
let memory=document.getElementById("memory");
let seq=[],user=[],level=1;

for(let i=0;i<9;i++){
let d=document.createElement("div");
d.style.width="60px";
d.style.height="60px";
d.style.background="#444";
d.style.display="inline-block";
d.style.margin="5px";
d.onclick=()=>clickM(i);
memory.appendChild(d);
}

function startM(){
user=[];
seq.push(Math.floor(Math.random()*9));
memText.innerText="Level "+level;

seq.forEach((n,i)=>{
setTimeout(()=>{
memory.children[n].style.background="yellow";
setTimeout(()=>memory.children[n].style.background="#444",300);
},i*600);
});
}

function clickM(i){
user.push(i);

if(user[user.length-1]!=seq[user.length-1]){
playSound();
saveScore("Memory",level);
seq=[];level=1;
startM();
return;
}

if(user.length==seq.length){
level++;
setTimeout(startM,500);
}
}
startM();

</script>

</body>
</html>
