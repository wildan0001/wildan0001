<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wildan Game Center</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#111;
color:#fff;
font-family:sans-serif;
}
.card{border-radius:16px;margin-bottom:15px}
#board{display:grid;grid-template-columns:repeat(3,100px);gap:5px;justify-content:center}
.cell{width:100px;height:100px;background:#fff;color:#000;font-size:40px;text-align:center;line-height:100px;cursor:pointer}
#flappy,#dodge{background:#000;border-radius:10px}
.memory-cell{width:60px;height:60px;background:#444;margin:5px;display:inline-block;border-radius:8px;cursor:pointer}
.active{background:yellow!important}
</style>
</head>

<body>
<div class="container py-4">

<!-- TIC TAC TOE -->
<div class="card p-3 text-center">
<h5>🎮 TicTacToe AI</h5>
<div id="board"></div>
<p id="status">Giliran kamu</p>
<button onclick="resetGame()" class="btn btn-danger">Reset</button>
</div>

<!-- FLAPPY -->
<div class="card p-3 text-center">
<h5>🔥 Flappy Hardcore</h5>
<canvas id="flappy" width="300" height="400"></canvas><br>
<button onclick="toggleFlappy()" class="btn btn-warning mt-2">⏯️ Play / Pause</button>
</div>

<!-- DODGE -->
<div class="card p-3 text-center">
<h5>🧱 Dodge Block</h5>
<canvas id="dodge" width="300" height="300"></canvas><br>
<button onclick="toggleDodge()" class="btn btn-warning mt-2">⏯️ Play / Pause</button>
</div>

<!-- REACTION -->
<div class="card p-3 text-center">
<h5>⚡ Reaction Test</h5>
<div id="reactionBox" style="height:120px;background:red;border-radius:10px;"></div>
<p id="reactionText">Tunggu hijau...</p>
</div>

<!-- MEMORY -->
<div class="card p-3 text-center">
<h5>🧠 Memory Hardcore</h5>
<div id="memory"></div>
<p id="memText"></p>
</div>

</div>

<script>

// ===== TIC TAC TOE =====
let board=["","","","","","","","",""];
let boardEl=document.getElementById("board");
let statusEl=document.getElementById("status");

function createBoard(){
boardEl.innerHTML="";
for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.onclick=()=>move(i);
boardEl.appendChild(d);
}}
createBoard();

function render(){
board.forEach((v,i)=>boardEl.children[i].innerText=v);
}

function move(i){
if(board[i])return;
board[i]="X";
if(win("X")) return end("Kamu menang 😱");
ai();
}

function ai(){
let kosong=board.map((v,i)=>v==""?i:null).filter(v=>v!=null);
let rand=kosong[Math.floor(Math.random()*kosong.length)];
board[rand]="O";
render();
if(win("O")) end("AI menang 😈");
}

function win(p){
let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
return w.some(c=>c.every(i=>board[i]==p));
}

function end(t){statusEl.innerText=t;}

function resetGame(){
board=["","","","","","","","",""];
statusEl.innerText="Giliran kamu";
render();
}
render();


// ===== FLAPPY =====
let ctx=flappy.getContext("2d");
let bird={x:50,y:150,v:0};
let pipes=[];
let flappyRunning=true;

function toggleFlappy(){flappyRunning=!flappyRunning;}

function flappyLoop(){
if(flappyRunning){
ctx.clearRect(0,0,300,400);
bird.v+=0.6;bird.y+=bird.v;

ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,20,20);

if(Math.random()<0.03){
let h=Math.random()*200;
pipes.push({x:300,top:h,bottom:h+120});
}

pipes.forEach(p=>{
p.x-=4;
ctx.fillStyle="green";
ctx.fillRect(p.x,0,30,p.top);
ctx.fillRect(p.x,p.bottom,30,400);

if(bird.x<p.x+30 && bird.x+20>p.x && (bird.y<p.top||bird.y>p.bottom)){
alert("Game Over 😈");
bird.y=150;bird.v=0;pipes=[];
}
});
}
requestAnimationFrame(flappyLoop);
}
flappy.onclick=()=>{if(flappyRunning)bird.v=-8;}
flappyLoop();


// ===== DODGE =====
let d=dodge.getContext("2d");
let player={x:140};
let blocks=[];
let dodgeRunning=true;

function toggleDodge(){dodgeRunning=!dodgeRunning;}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft")player.x-=20;
if(e.key=="ArrowRight")player.x+=20;
player.x=Math.max(0,Math.min(280,player.x));
});

function dodgeLoop(){
if(dodgeRunning){
d.clearRect(0,0,300,300);

d.fillStyle="white";
d.fillRect(player.x,260,20,20);

if(Math.random()<0.05)blocks.push({x:Math.random()*280,y:0});

blocks.forEach(b=>{
b.y+=3;
d.fillRect(b.x,b.y,20,20);

if(b.y>260 && b.x<player.x+20 && b.x+20>player.x){
alert("Kena 😈");
blocks=[];
}
});
}
requestAnimationFrame(dodgeLoop);
}
dodgeLoop();


// ===== REACTION =====
let start;
function startReaction(){
reactionBox.style.background="red";
reactionText.innerText="Tunggu...";
setTimeout(()=>{
reactionBox.style.background="green";
start=Date.now();
reactionText.innerText="KLIK!";
},Math.random()*3000+1000);
}
reactionBox.onclick=()=>{
if(reactionBox.style.background=="green"){
reactionText.innerText=(Date.now()-start)+" ms 😱";
}else{
reactionText.innerText="KECEPETAN 😡";
}
startReaction();
}
startReaction();


// ===== MEMORY =====
let memory=document.getElementById("memory");
let memText=document.getElementById("memText");
let seq=[],user=[],level=1,lock=false;

function createMemory(){
memory.innerHTML="";
for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="memory-cell";
d.onclick=()=>clickMem(i);
memory.appendChild(d);
}}
createMemory();

function startMemory(){
user=[];lock=true;
seq.push(Math.floor(Math.random()*9));
memText.innerText="Level "+level;

seq.forEach((n,i)=>{
setTimeout(()=>{
memory.children[n].classList.add("active");
setTimeout(()=>memory.children[n].classList.remove("active"),300);
},i*600);
});

setTimeout(()=>lock=false,seq.length*600);
}

function clickMem(i){
if(lock)return;
user.push(i);

if(user[user.length-1]!=seq[user.length-1]){
alert("Salah 😈");
seq=[];level=1;
startMemory();
return;
}

if(user.length==seq.length){
level++;
setTimeout(startMemory,500);
}
}
startMemory();

</script>
</body>
</html>
