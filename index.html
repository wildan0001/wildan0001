<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wildan Renaldinata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(270deg, #ff6ec7, #42a5f5, #ffb74d, #7873f5, #4ecdc4, #ffe66d);
      background-size: 1000% 1000%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      color: #333;
    }
    @keyframes gradientShift {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
    .card {
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    section {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 20px;
      max-width: 800px;
      margin: 20px auto;
      border-radius: 10px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin: 20px auto;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: #fff;
      border: 2px solid #333;
      font-size: 40px;
      text-align: center;
      line-height: 100px;
      cursor: pointer;
      font-weight: bold;
    }
    #status {
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar bg-light shadow-sm">
  <div class="container-fluid">
    <span class="fw-bold">Wildan Renaldinata</span>
    <img src="https://placekitten.com/50/50" class="rounded-circle" width="40" height="40">
  </div>
</nav>

<div class="container py-4">

  <!-- Time -->
  <div class="card p-3 text-center mb-3">
    <h5>⏰ Time Information</h5>
    <h3 id="time">--:--:--</h3>
    <p id="greet">Hello!</p>
  </div>

  <!-- Battery -->
  <div class="card p-3 text-center mb-3">
    <h5>🔋 Battery</h5>
    <h3 id="battery">--%</h3>
    <p id="batteryStatus">Checking...</p>
  </div>

  <!-- Profile -->
  <section>
    <h2>🧑 Tentang Saya</h2>
    <p>Halo! Nama saya <strong>Wildan Renaldinata</strong>. Saya suka teknologi & game 😎</p>
  </section>

  <!-- Tic Tac Toe -->
  <section>
    <h2>❌⭕ Tic Tac Toe MODE DEWA 😈</h2>
    <div id="board">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <p id="status">Giliran: Kamu (X)</p>
    <button class="btn btn-primary" onclick="resetGame()">🔄 Reset</button>
  </section>

  <!-- Quiz -->
  <section>
    <h2>🧠 Quiz Mode Dewa</h2>
    <p id="question"></p>
    <input type="number" id="answer" class="form-control w-50 mx-auto mb-2">
    <button class="btn btn-success" onclick="checkAnswer()">Jawab</button>
    <p id="feedback"></p>
    <p>Skor: <span id="score">0</span></p>
  </section>

</div>

<script>
/* ===== TIME ===== */
function updateTime() {
  let now = new Date();
  let h = String(now.getHours()).padStart(2,'0');
  let m = String(now.getMinutes()).padStart(2,'0');
  let s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('time').innerText = `${h}:${m}:${s}`;
  document.getElementById('greet').innerText =
    h < 12 ? "Good Morning!" :
    h < 18 ? "Good Afternoon!" : "Good Evening!";
}
setInterval(updateTime,1000);

/* ===== BATTERY ===== */
if (navigator.getBattery) {
  navigator.getBattery().then(function(battery) {
    function updateBattery() {
      document.getElementById('battery').innerText = Math.round(battery.level * 100) + "%";
      document.getElementById('batteryStatus').innerText =
        battery.charging ? "Charging" : "Discharging";
    }
    updateBattery();
    battery.addEventListener("levelchange", updateBattery);
    battery.addEventListener("chargingchange", updateBattery);
  });
}

/* ===== TIC TAC TOE DEWA ===== */
const cells = document.querySelectorAll(".cell");
const statusText = document.getElementById("status");
let gameOver = false;

function checkWin(mark){
  const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return win.some(([a,b,c]) =>
    cells[a].textContent===mark &&
    cells[b].textContent===mark &&
    cells[c].textContent===mark
  );
}

function checkDraw(){
  return [...cells].every(c => c.textContent !== "");
}

function minimax(board,isMax){
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function winner(b){
    for(let [a,b1,c] of wins){
      if(b[a] && b[a]==b[b1] && b[a]==b[c]) return b[a];
    }
    if(!b.includes("")) return "draw";
    return null;
  }

  let res = winner(board);
  if(res==="O") return 1;
  if(res==="X") return -1;
  if(res==="draw") return 0;

  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(board[i]==""){
        board[i]="O";
        best=Math.max(best,minimax(board,false));
        board[i]="";
      }
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(board[i]==""){
        board[i]="X";
        best=Math.min(best,minimax(board,true));
        board[i]="";
      }
    }
    return best;
  }
}

function botMove(){
  if(gameOver) return;

  let board=[...cells].map(c=>c.textContent);
  let bestScore=-Infinity;
  let move;

  for(let i=0;i<9;i++){
    if(board[i]==""){
      board[i]="O";
      let score=minimax(board,false);
      board[i]="";
      if(score>bestScore){
        bestScore=score;
        move=i;
      }
    }
  }

  cells[move].textContent="O";

  if(checkWin("O")){
    statusText.textContent="❌ Kamu Kalah! 🤖🔥";
    gameOver=true;
  } else if(checkDraw()){
    statusText.textContent="😅 Seri!";
    gameOver=true;
  } else {
    statusText.textContent="Giliran: Kamu (X)";
  }
}

cells.forEach(cell=>{
  cell.onclick=()=>{
    if(cell.textContent!=="" || gameOver) return;

    cell.textContent="X";

    if(checkWin("X")){
      statusText.textContent="🏆 Kamu Menang!";
      gameOver=true;
    } else if(checkDraw()){
      statusText.textContent="😅 Seri!";
      gameOver=true;
    } else {
      statusText.textContent="Bot berpikir...";
      setTimeout(botMove,300);
    }
  }
});

function resetGame(){
  cells.forEach(c=>c.textContent="");
  gameOver=false;
  statusText.textContent="Giliran: Kamu (X)";
}

/* ===== QUIZ DEWA ===== */
let correctAnswer=0;
let score=0;

function newQuestion(){
  let a=Math.floor(Math.random()*50)+10;
  let b=Math.floor(Math.random()*50)+10;
  let ops=["+","-","×","÷"];
  let op=ops[Math.floor(Math.random()*ops.length)];

  if(op==="+"){correctAnswer=a+b;}
  if(op==="-"){correctAnswer=a-b;}
  if(op==="×"){correctAnswer=a*b;}
  if(op==="÷"){correctAnswer=b; a=a*b;}

  document.getElementById("question").textContent=`${a} ${op} ${b} = ?`;
}

function checkAnswer(){
  let val=parseInt(document.getElementById("answer").value);
  if(val===correctAnswer){
    score++;
    document.getElementById("feedback").textContent="✅ Benar!";
  } else {
    document.getElementById("feedback").textContent="❌ Salah! "+correctAnswer;
  }
  document.getElementById("score").textContent=score;
  newQuestion();
}

newQuestion();
</script>

</body>
</html>
