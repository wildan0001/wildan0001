<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wildan Renaldinata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(270deg,#ff6ec7,#42a5f5,#ffb74d,#7873f5,#4ecdc4,#ffe66d);
background-size:1000% 1000%;
animation:gradientShift 15s infinite;
}
@keyframes gradientShift{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
.card{border-radius:16px}
#board{display:grid;grid-template-columns:repeat(3,100px);gap:5px;justify-content:center}
.cell{width:100px;height:100px;background:#fff;border:2px solid #333;font-size:40px;text-align:center;line-height:100px;cursor:pointer}
#dodge{background:#000;border-radius:10px}
.memory-cell{width:60px;height:60px;background:#444;margin:5px;display:inline-block;border-radius:8px;cursor:pointer}
.active{background:yellow!important}
</style>
</head>

<body>
<div class="container py-4">

<!-- TIC TAC TOE -->
<div class="card p-3 text-center mb-3">
<h5>🎮 TicTacToe Mustahil 😈</h5>
<div id="board"></div>
<p id="status">Giliran kamu</p>
<button onclick="resetGame()" class="btn btn-danger">Reset</button>
</div>

<!-- FLAPPY -->
<div class="card p-3 text-center mb-3">
<h5>🔥 Flappy Hardcore</h5>
<canvas id="flappy" width="300" height="400"></canvas>
</div>

<!-- REACTION -->
<div class="card p-3 text-center mb-3">
<h5>⚡ Reaction Test</h5>
<div id="reactionBox" style="height:120px;background:red"></div>
<p id="reactionText">Tunggu...</p>
</div>

<!-- DODGE GAME -->
<div class="card p-3 text-center mb-3">
<h5>🧱 Dodge Block (Super Susah)</h5>
<canvas id="dodge" width="300" height="300"></canvas>
<p>Gerak: ← →</p>
</div>

<!-- MEMORY -->
<div class="card p-3 text-center mb-3">
<h5>🧠 Memory Hardcore</h5>
<div id="memory"></div>
<p id="memText">Level 1</p>
</div>

</div>

<script>
// ===== TIC TAC TOE =====
let board=["","","","","","","","",""];
function createBoard(){
let b=document.getElementById("board");
b.innerHTML="";
for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="cell";
d.onclick=()=>move(i);
b.appendChild(d);
}}
createBoard();

function render(){board.forEach((v,i)=>boardEl.children[i].innerText=v)}
function move(i){
if(board[i])return;
board[i]="X";
ai();
}
function ai(){
for(let i=0;i<9;i++){
if(!board[i]){board[i]="O";break;}
}
update();
}
function update(){
let b=document.getElementById("board");
board.forEach((v,i)=>b.children[i].innerText=v);
}
function resetGame(){board=["","","","","","","","",""];update();}

// ===== FLAPPY =====
let f=flappy.getContext("2d"),bird={x:50,y:150,v:0},pipes=[];
function flappyLoop(){
f.clearRect(0,0,300,400);
bird.v+=0.6;bird.y+=bird.v;
f.fillStyle="yellow";f.fillRect(bird.x,bird.y,20,20);
if(Math.random()<0.03){let h=Math.random()*200;pipes.push({x:300,top:h,bottom:h+120});}
pipes.forEach(p=>{
p.x-=5;
f.fillStyle="green";
f.fillRect(p.x,0,30,p.top);
f.fillRect(p.x,p.bottom,30,400);
if(bird.x<p.x+30&&bird.x+20>p.x&&(bird.y<p.top||bird.y>p.bottom)){
alert("Kalah 😈");pipes=[];bird.y=150;
}});
requestAnimationFrame(flappyLoop);
}
flappy.onclick=()=>bird.v=-8;
flappyLoop();

// ===== REACTION =====
let start;
function reactStart(){
reactionBox.style.background="red";
setTimeout(()=>{
reactionBox.style.background="green";
start=Date.now();
},Math.random()*3000);
}
reactionBox.onclick=()=>{
if(reactionBox.style.background=="green"){
reactionText.innerText=(Date.now()-start)+" ms";
}else{
reactionText.innerText="KECEPETAN!";
}
reactStart();
};
reactStart();

// ===== DODGE =====
let d=dodge.getContext("2d");
let player={x:140};
let blocks=[];
let speed=2;

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft")player.x-=20;
if(e.key=="ArrowRight")player.x+=20;
});

function dodgeLoop(){
d.clearRect(0,0,300,300);
d.fillStyle="white";
d.fillRect(player.x,260,20,20);

if(Math.random()<0.05)blocks.push({x:Math.random()*280,y:0});

blocks.forEach(b=>{
b.y+=speed;
d.fillRect(b.x,b.y,20,20);

if(b.y>260 && b.x<player.x+20 && b.x+20>player.x){
alert("Kena 😈");
blocks=[];speed=2;
}
});

speed+=0.002;
requestAnimationFrame(dodgeLoop);
}
dodgeLoop();

// ===== MEMORY =====
let level=1,seq=[],user=[];
function startMemory(){
user=[];
seq.push(Math.floor(Math.random()*9));
memText.innerText="Level "+level;
showSeq();
}

function showSeq(){
let cells=document.querySelectorAll(".memory-cell");
cells.forEach(c=>c.classList.remove("active"));
seq.forEach((n,i)=>{
setTimeout(()=>cells[n].classList.add("active"),i*500);
setTimeout(()=>cells[n].classList.remove("active"),i*500+300);
});
}

function createMemory(){
let m=document.getElementById("memory");
for(let i=0;i<9;i++){
let d=document.createElement("div");
d.className="memory-cell";
d.onclick=()=>clickMem(i);
m.appendChild(d);
}}
createMemory();

function clickMem(i){
user.push(i);
if(user[user.length-1]!=seq[user.length-1]){
alert("Salah 😈 ulang!");
seq=[];level=1;startMemory();return;
}
if(user.length==seq.length){
level++;
setTimeout(startMemory,500);
}
}
startMemory();
</script>

</body>
</html>
